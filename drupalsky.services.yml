services:
 
  logger.channel.drupalsky:
    parent: logger.channel_base
    arguments: ['drupalsky']
    
  drupalsky.endpoints:
    class: Drupal\drupalsky\EndPoints

  drupalsky.atprotoservice:
    class: Drupal\drupalsky\AtprotoClientService
    arguments:
      - '@logger.channel.drupalsky'
      - '@config.factory'
      - '@key.repository'
      - '@http_client'
      - '@tempstore.private'
      - '@drupalsky.endpoints'

  drupalsky.bskyservice:
    class: Drupal\drupalsky\BlueskyContentService
    arguments:
      - '@drupalsky.atprotoservice'
      - '@drupalsky.endpoints'

  Drupal\drupalsky\Hook\DrupalSkyHooks:
    class: Drupal\drupalsky\Hook\DrupalSkyHooks

